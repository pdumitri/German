function praetConj(v,si){
// Regular: stem+te/test/te/ten
if(v[3].endsWith('te')){const st=v[3].slice(0,-2);const ends=['te','test','te','te','ten'];return st+ends[si];}
// Irregular: use base form for ich, modify for others
const base=v[3].includes(' ')?v[3]:v[3];// handle "stand auf"
if(si===0)return base;if(si===1)return base+(base.endsWith('t')?'est':'st');if(si===2)return base;if(si===3)return base+'en';
return base;
}

const casDat={ro:'Cui?',uk:'Кому?',vi:'Cho ai?',tr:'Kime?',az:'Kimə?',ru:'Кому?',fr:'À qui?'};
document.getElementById('rP').innerHTML=`<h3>${t('ref')}</h3>
<table class="ref"><tr><th></th><th>${t('m')}</th><th>${t('f')}</th><th>${t('n')}</th></tr>
<tr><td><b>NOM</b> (${casNom[lang]})</td><td>der/ein</td><td>die/eine</td><td>das/ein</td></tr>
<tr><td><b>AKK</b> (${casAkk[lang]})</td><td style="color:#e94560"><b>den/einen</b></td><td>die/eine</td><td>das/ein</td></tr>
<tr><td><b>DAT</b> (${casDat[lang]})</td><td style="color:#f0c040"><b>dem/einem</b></td><td style="color:#f0c040"><b>der/einer</b></td><td style="color:#f0c040"><b>dem/einem</b></td></tr></table>
<h3>Pronomen (${t('ref')})</h3>
<table class="ref"><tr><th></th><th>ich</th><th>du</th><th>er</th><th>sie</th><th>es</th><th>wir</th><th>ihr</th><th>sie/Sie</th></tr>
<tr><td><b>NOM</b></td><td>ich</td><td>du</td><td>er</td><td>sie</td><td>es</td><td>wir</td><td>ihr</td><td>sie</td></tr>
<tr><td><b>AKK</b></td><td>mich</td><td>dich</td><td>ihn</td><td>sie</td><td>es</td><td>uns</td><td>euch</td><td>sie</td></tr>
<tr><td><b>DAT</b></td><td>mir</td><td>dir</td><td>ihm</td><td>ihr</td><td>ihm</td><td>uns</td><td>euch</td><td>ihnen</td></tr></table>
<p style="color:#f44336;margin-top:10px">${t('prepA')}</p><p style="color:#4caf50">${t('prepD')}</p><p style="color:#ff9800">${t('prepW')}</p>`;}

function gen(){
const cats=cat==='all'?['nom','akk','dat','pa','pd','we','pron','wf','perfekt','praet']:[cat==='prep'?pick(['pa','pd']):cat==='wech'?'we':cat];
const tp=pick(Array.isArray(cats)?cats:[cats]);
let sentence,answer,options,hint,expl,trans;
if(tp==='pron'){const p=pick(PRON);const isA=Math.random()>0.5;answer=isA?p.a:p.d;sentence=`Er ${isA?'sieht':'hilft'} ___ . (${p.n})`;hint=isA?t('vAkk'):t('vDat');expl=`"${p.n}" ${isA?t('prAkk'):t('prDat')} <b>${answer}</b> (${t('other')} ${isA?p.d:p.a})`;trans='';options=[p.a,p.d];while(options.length<4)options.push(pick(['mich','mir','dich','dir','ihn','ihm','uns','euch'].filter(x=>!options.includes(x))));}
else if(tp==='wf'){const w=pick(WF);sentence=w.q;answer=w.a;options=[...w.o];hint=t('think');expl=`<b>${w.a}</b>`;trans=`${t('translation')} ${w.tr[li[lang]]}`;}
else if(tp==='perfekt'){
const v=pick([...VERBS_REG,...VERBS_IRR]);const[s,hab,sei]=pick(SUBJ_PERF);
const aux=v[2]==='h'?hab:sei;answer=v[1];
sentence=`${s} ${aux} gestern ___ . (${v[0]})`;
hint=`${v[0]} → Partizip II = ?`;
const isReg=VERBS_REG.includes(v);
expl=`<b>${v[0]}</b> → <b>${v[1]}</b> (${isReg?'regulat: ge-+Stamm+-t':'neregulat: ge-+Stamm+-en'})<br>Auxiliar: <b>${v[2]==='h'?'haben':'sein'}</b>${v[2]==='s'?' (mișcare/schimbare)':''}`;
trans=`${t('translation')} ${(subjTr[s]||[s])[li[lang]]} ${yesterdayTr[li[lang]]} ${v[5][li[lang]]}.`;
const others=[...VERBS_REG,...VERBS_IRR].filter(x=>x[1]!==v[1]);
options=[v[1],pick(others)[1],pick(others)[1],'ge'+v[0].slice(0,-2)+'t'];
}
else if(tp==='praet'){
const v=pick([...VERBS_REG,...VERBS_IRR]);const[s,si]=pick(SUBJ_PRAET);
answer=praetConj(v,si);
sentence=`${s} ___ gestern viel. (${v[0]})`;
hint=`${v[0]} → Präteritum ${s} = ?`;
const isReg=VERBS_REG.includes(v);
expl=`<b>${v[0]}</b> → Prät.: <b>${v[3]}</b> (${isReg?'regulat: Stamm+-te':'neregulat'})<br>${s} → <b>${answer}</b>`;
trans=`${t('translation')} ${(subjTr[s]||[s])[li[lang]]} ${yesterdayTr[li[lang]]} ${v[5][li[lang]]}.`;
const others=[...VERBS_REG,...VERBS_IRR].filter(x=>x!==v);
options=[answer,pick(others)[3],v[1],v[0]+'te'];
}
else{
const tmpls=tp==='nom'?NOM_T:tp==='akk'?AKK_T:tp==='dat'?DAT_T:tp==='pa'?PA_T:tp==='pd'?PD_T:WE_T;
const ns=NS[tp]||NS.akk;const g=pick(Object.keys(ns).filter(x=>ns[x].length>0));const noun=pick(ns[g]);
const tmpl=pick(tmpls);const cas=tp==='nom'?'nom':tp==='akk'||tp==='pa'?'akk':tp==='dat'||tp==='pd'?'dat':(tp==='we'?(tmpl[1]==='akk'?'akk':'dat'):'akk');
const def=Math.random()>0.5;answer=art(g,cas,def);
const key=tmpl[0]+noun;if(used.has(key)&&used.size<500)return gen();used.add(key);
sentence=tmpl[0].replace('{a}','___').replace('{n}',noun);
const gn=t(g==='m'?'m':g==='f'?'f':'n');
if(cas==='nom'){hint=t('nomR');expl=t('nomR')+`<br>"${noun}" = <b>${g==='m'?'der':g==='f'?'die':'das'} ${noun}</b> (${gn})`;}
else if(cas==='akk'){hint=`${t('vAkk')} "${noun}"=${gn}`;expl=(g==='m'?t('mAkk'):t('noChg'))+`<br>"${noun}" = <b>${g==='m'?'der':g==='f'?'die':'das'} ${noun}</b> (${gn})`;}
else{hint=`${t('vDat')} "${noun}"=${gn}`;expl=`${g==='m'?t('dM'):g==='f'?t('dF'):t('dN')}<br>"${noun}" = <b>${g==='m'?'der':g==='f'?'die':'das'} ${noun}</b> (${gn})`;}
const trArr=tp==='we'?tmpl[2]:tmpl[1];
const trV=trArr[li[lang]]||trArr[0]||'';
const nTr=tp==='nom'?wtNom(noun):wt(noun);
if(tp==='nom'){trans=`${t('translation')} ${nTr.charAt(0).toUpperCase()+nTr.slice(1)} ${trV}`;}
else{trans=`${t('translation')} ${trV} ${nTr}.`;}
if(cas==='nom')options=def?['der','die','das','dem']:['ein','eine','ein','einem'];
else if(cas==='akk')options=def?['den','die','das','dem']:['einen','eine','ein','einem'];
else options=def?['dem','der','den','das']:['einem','einer','einen','eine'];
}
if(!options.includes(answer))options[0]=answer;
options=[...new Set(options)];while(options.length<4)options.push(pick(['den','dem','der','die','das','ein','eine','einen','einem','einer'].filter(x=>!options.includes(x))));
return{sentence,answer,options:options.slice(0,4).sort(()=>Math.random()-0.5),hint,expl,trans};
}
function render(){cur=gen();ans=false;document.getElementById('q').innerHTML=cur.sentence.replace('___','<span class="blank">?</span>');document.getElementById('hb').textContent=t('hint');document.getElementById('exp').classList.remove('show');document.getElementById('nxt').classList.remove('show');document.getElementById('nxt').textContent=t('next');document.getElementById('opts').innerHTML=cur.options.map(o=>`<div class="opt" onclick="CK(this,'${o}')">${o}</div>`).join('');}
function SH(){document.getElementById('hb').textContent='💡 '+cur.hint;}
function CK(el,sel){if(ans)return;ans=true;document.querySelectorAll('.opt').forEach(o=>{if(o.textContent===cur.answer)o.classList.add('correct');if(o.textContent===sel&&sel!==cur.answer)o.classList.add('wrong');});let h='';if(sel===cur.answer){sc++;stk++;h=`<span style="color:#4caf50">${t('correct')}</span>`;}else{wr++;stk=0;h=`<span style="color:#f44336">${t('wrong')} <b style="color:#4caf50;font-size:1.2em">${cur.answer}</b></span><br><b>${t('why')}</b> ${cur.expl}`;}if(cur.trans){}document.getElementById('exp').innerHTML=h;document.getElementById('sc').textContent=sc;document.getElementById('wr').textContent=wr;document.getElementById('stk').textContent=stk;document.getElementById('exp').classList.add('show');document.getElementById('nxt').classList.add('show');}
function NX(){render();}
updUI();render();
</script></body></html>
